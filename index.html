<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان 2026 🌙 | سبحة التسبيح</title>
    <meta name="theme-color" content="#d4af37">
    
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
    <script>
      window.OneSignal = window.OneSignal || [];
      OneSignal.push(function() {
        OneSignal.init({
          appId: "7724086e-22de-45ef-bc4c-f4b5cd122604",
          allowLocalhostAsSecureOrigin: true,
          autoRegister: true,
          persistNotification: true,
          notifyButton: {
            enable: true,
            size: 'large',
            position: 'bottom-left',
            showCredit: false,
            text: {
              'tap-to-subscribe': '🔔 تفعيل الإشعارات',
              'subscribe': 'اشترك الآن',
              'unsubscribe': 'إلغاء الاشتراك'
            }
          }
        });
      });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(145deg, #0a0a0a 0%, #1a0f0f 100%);
            color: #e5e5e5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            touch-action: manipulation; 
        }
        
        .main-container { 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            padding: 1.5rem; 
        }
        
        .ramadan-header {
            background: linear-gradient(145deg, #b8860b20, #d4af3710);
            border: 1px solid #d4af3740;
            border-radius: 30px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .date-main {
            font-size: 2.2rem;
            font-weight: 900;
            color: #d4af37;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .date-details {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            color: #888;
            font-size: 0.9rem;
        }

        .ramadan-countdown {
            background: #00000040;
            border-radius: 50px;
            padding: 0.7rem;
            margin-top: 0.8rem;
            border: 1px solid #d4af3722;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .countdown-number {
            font-size: 1.8rem;
            font-weight: 900;
            color: #d4af37;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            margin-bottom: 6px;
            border: 1px solid #d4af3722;
        }

        .prayer-name {
            font-weight: bold;
            color: #d4af37;
            font-size: 1rem;
        }

        .prayer-time {
            font-family: monospace;
            font-size: 1.2rem;
            direction: ltr;
            background: #00000040;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #d4af3733;
        }

        .test-notif-btn {
            background: #2a2a2a;
            border: 1px dashed #d4af37;
            color: #d4af37;
            padding: 15px;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-weight: bold;
        }

        .test-notif-btn:active {
            background: #d4af3722;
            transform: scale(0.96);
        }

        .notif-success {
            background: #22c55e20;
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 10px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .notif-error {
            background: #ef444420;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .tasbih-circle { 
            width: 260px; 
            height: 260px; 
            border: 3px solid #b8860b; 
            border-radius: 50%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.15s; 
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #000000); 
            margin: 1.5rem auto;
        }
        
        .tasbih-circle:active { 
            transform: scale(0.94); 
            border-color: #ffd700; 
            box-shadow: 0 0 40px #ffd700;
        }
        
        .control-btn { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 1rem; 
            border-radius: 16px; 
            font-size: 1rem; 
            font-weight: 500;
            transition: all 0.2s; 
            width: 100%; 
            cursor: pointer;
            color: #fff;
        }
        
        .control-btn:active {
            background: #2a2a2a;
            border-color: #d4af37;
        }

        #notif-status {
            background: #00000080;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 15px;
            border-radius: 50px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- رأس الصفحة - التاريخ والعد التنازلي -->
        <div class="ramadan-header">
            <div class="date-main" id="full-date">الخميس 26 فبراير 2026</div>
            <div class="date-details">
                <span id="hijri-date">19 شعبان 1447 هـ</span>
            </div>
            <div class="ramadan-countdown">
                <span>🌙 رمضان 2026</span>
                <span class="countdown-number" id="ramadan-days">--</span>
                <span>يوم</span>
            </div>
        </div>

        <!-- مواقيت الصلاة - تنسيق 12 ساعة -->
        <div class="bg-[#111] p-4 rounded-2xl border border-[#d4af3722] mb-4">
            <h2 class="text-[#d4af37] font-bold mb-3 text-right">🕌 مواقيت الصلاة</h2>
            
            <div class="prayer-item">
                <span class="prayer-name">🌅 الفجر</span>
                <span class="prayer-time" id="fajr-time">04:18 ص</span>
            </div>
            <div class="prayer-item">
                <span class="prayer-name">☀️ الظهر</span>
                <span class="prayer-time" id="dhuhr-time">11:58 ص</span>
            </div>
            <div class="prayer-item">
                <span class="prayer-name">⛅ العصر</span>
                <span class="prayer-time" id="asr-time">03:28 م</span>
            </div>
            <div class="prayer-item">
                <span class="prayer-name">🌇 المغرب</span>
                <span class="prayer-time" id="maghrib-time">05:48 م</span>
            </div>
            <div class="prayer-item">
                <span class="prayer-name">🌙 العشاء</span>
                <span class="prayer-time" id="isha-time">07:18 م</span>
            </div>
        </div>

        <!-- الذكر الحالي -->
        <div class="mb-4">
            <p id="dhikr-display" class="text-3xl font-black text-white">سبحان الله</p>
        </div>

        <!-- دائرة التسبيح -->
        <div class="tasbih-circle" id="main-tap">
            <span id="counter" class="text-8xl font-black text-white">0</span>
            <span class="text-xs text-[#d4af37] mt-2">➕ اضغط للتسبيح</span>
        </div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-2 gap-4 my-4">
            <div class="bg-[#111] p-4 rounded-2xl">
                <span class="text-xs text-gray-500">📊 الإجمالي</span>
                <span id="total-count" class="block text-2xl font-bold text-[#d4af37]">0</span>
            </div>
            <div class="bg-[#111] p-4 rounded-2xl">
                <span class="text-xs text-gray-500">🔄 الختمات</span>
                <span id="laps-count" class="block text-2xl font-bold text-white">0</span>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="flex flex-col gap-3">
            <button onclick="changeDhikr()" class="control-btn">🔄 الذكر التالي</button>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="resetCounter()" class="control-btn text-red-400">🔄 تصفير</button>
                <button onclick="toggleSound()" id="sound-toggle" class="control-btn text-[#d4af37]">🔊 صوت: ON</button>
            </div>

            <!-- زر تفعيل الإشعارات -->
            <button onclick="setupNotifications()" class="bg-gradient-to-r from-[#b8860b] to-[#d4af37] text-white p-4 rounded-xl font-bold">
                🔔 تفعيل إشعارات الصلوات
            </button>

            <!-- زر تجربة الإشعار المحسن -->
            <button onclick="testNotification()" class="test-notif-btn">
                📱 اضغط هنا لتجربة الإشعار
                <span class="block text-xs opacity-70">(ستصلك رسالة تجريبية)</span>
            </button>
            
            <!-- حالة الإشعارات -->
            <div id="notif-status" class="hidden"></div>
        </div>
    </div>

    <!-- المؤثرات الصوتية -->
    <audio id="click-sfx" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="complete-sfx" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        (function() {
            // ==================== المتغيرات ====================
            let count = 0;
            let total = parseInt(localStorage.getItem('tasbih_total')) || 0;
            let isSoundOn = localStorage.getItem('sound_enabled') !== 'false';
            
            const dhikrs = ["سبحان الله", "الحمد لله", "لا إله إلا الله", "الله أكبر", "أستغفر الله", "اللهم صلِّ على محمد"];
            let dhikrIdx = parseInt(localStorage.getItem('current_dhikr')) || 0;

            // ==================== عناصر DOM ====================
            const elements = {
                mainBtn: document.getElementById('main-tap'),
                counter: document.getElementById('counter'),
                total: document.getElementById('total-count'),
                laps: document.getElementById('laps-count'),
                dhikrDisplay: document.getElementById('dhikr-display'),
                soundToggle: document.getElementById('sound-toggle'),
                notifStatus: document.getElementById('notif-status'),
                clickSfx: document.getElementById('click-sfx'),
                completeSfx: document.getElementById('complete-sfx'),
                fullDate: document.getElementById('full-date'),
                hijriDate: document.getElementById('hijri-date'),
                ramadanDays: document.getElementById('ramadan-days'),
                prayerTimes: {
                    fajr: document.getElementById('fajr-time'),
                    dhuhr: document.getElementById('dhuhr-time'),
                    asr: document.getElementById('asr-time'),
                    maghrib: document.getElementById('maghrib-time'),
                    isha: document.getElementById('isha-time')
                }
            };

            // ==================== تحديث التاريخ ====================
            function updateDate() {
                const now = new Date();
                
                // الأيام بالعربية
                const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
                
                const dayName = days[now.getDay()];
                const day = now.getDate();
                const month = months[now.getMonth()];
                const year = now.getFullYear();
                
                elements.fullDate.innerText = `${dayName} ${day} ${month} ${year}`;
                
                // تاريخ هجري تقريبي
                const hijriMonth = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الآخر', 'جمادى الأولى', 'جمادى الآخرة', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];
                const hijriDay = Math.floor((day % 30) + 10) % 30 || 1;
                const hijriMonthIndex = 7; // شعبان تقريباً
                
                elements.hijriDate.innerText = `${hijriDay} ${hijriMonth[hijriMonthIndex]} 1447 هـ`;
                
                // العد التنازلي لرمضان
                const ramadan2026 = new Date(2026, 1, 18); // 18 فبراير 2026
                const diffTime = ramadan2026 - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays > 0) {
                    elements.ramadanDays.innerText = diffDays;
                } else if (diffDays === 0) {
                    elements.ramadanDays.innerText = 'اليوم';
                } else {
                    elements.ramadanDays.innerText = 'بدأ';
                }
            }

            // ==================== جلب مواقيت الصلاة (12 ساعة) ====================
            async function fetchPrayerTimes() {
                try {
                    const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
                    const data = await response.json();
                    const timings = data.data.timings;
                    
                    // تحويل إلى تنسيق 12 ساعة
                    function to12Hour(time) {
                        const [hours, minutes] = time.split(':');
                        const h = parseInt(hours);
                        const period = h >= 12 ? 'م' : 'ص';
                        const hour12 = h % 12 || 12;
                        return `${hour12.toString().padStart(2, '0')}:${minutes} ${period}`;
                    }
                    
                    elements.prayerTimes.fajr.innerText = to12Hour(timings.Fajr);
                    elements.prayerTimes.dhuhr.innerText = to12Hour(timings.Dhuhr);
                    elements.prayerTimes.asr.innerText = to12Hour(timings.Asr);
                    elements.prayerTimes.maghrib.innerText = to12Hour(timings.Maghrib);
                    elements.prayerTimes.isha.innerText = to12Hour(timings.Isha);
                    
                } catch (error) {
                    console.log('خطأ في جلب المواقيت، استخدام بيانات افتراضية');
                    // بيانات افتراضية
                    elements.prayerTimes.fajr.innerText = '04:18 ص';
                    elements.prayerTimes.dhuhr.innerText = '11:58 ص';
                    elements.prayerTimes.asr.innerText = '03:28 م';
                    elements.prayerTimes.maghrib.innerText = '05:48 م';
                    elements.prayerTimes.isha.innerText = '07:18 م';
                }
            }

            // ==================== تجربة الإشعار المحسنة ====================
            window.testNotification = function() {
                elements.notifStatus.classList.remove('hidden', 'notif-success', 'notif-error');
                
                // التحقق من إذن الإشعارات
                if (Notification.permission !== 'granted') {
                    elements.notifStatus.className = 'notif-error';
                    elements.notifStatus.innerText = '❌ الإشعارات غير مفعلة - اضغط على "تفعيل الإشعارات" أولاً';
                    return;
                }
                
                try {
                    // إنشاء إشعار تجريبي مع خيارات متعددة
                    const notification = new Notification('🧪 تجربة الإشعار', {
                        body: '✅ الإشعارات تعمل بنجاح! هذه رسالة تجريبية',
                        icon: 'https://cdn-icons-png.flaticon.com/512/2319/2319833.png',
                        badge: 'https://cdn-icons-png.flaticon.com/512/2319/2319833.png',
                        vibrate: [200, 100, 200],
                        requireInteraction: true,
                        silent: false,
                        tag: 'test-' + Date.now()
                    });
                    
                    // تشغيل الصوت والاهتزاز
                    if (isSoundOn) {
                        elements.completeSfx.currentTime = 0;
                        elements.completeSfx.play().catch(() => {});
                    }
                    
                    if ("vibrate" in navigator) {
                        navigator.vibrate([200, 100, 200]);
                    }
                    
                    // عرض رسالة نجاح
                    elements.notifStatus.className = 'notif-success';
                    elements.notifStatus.innerText = '✅ تم إرسال الإشعار بنجاح! تحقق من شاشة القفل';
                    
                    // إغلاق الرسالة بعد 3 ثواني
                    setTimeout(() => {
                        elements.notifStatus.classList.add('hidden');
                    }, 3000);
                    
                } catch (error) {
                    console.error('خطأ في الإشعار:', error);
                    elements.notifStatus.className = 'notif-error';
                    elements.notifStatus.innerText = '❌ فشل في إرسال الإشعار - ' + error.message;
                }
            };

            // ==================== تفعيل الإشعارات ====================
            window.setupNotifications = async function() {
                try {
                    const permission = await Notification.requestPermission();
                    
                    if (permission === 'granted') {
                        elements.notifStatus.className = 'notif-success';
                        elements.notifStatus.innerText = '✅ تم تفعيل الإشعارات بنجاح! اضغط على "تجربة الإشعار" للتأكد';
                        elements.notifStatus.classList.remove('hidden');
                        
                        // تفعيل OneSignal
                        if (window.OneSignal) {
                            OneSignal.push(function() {
                                OneSignal.setSubscription(true);
                            });
                        }
                        
                        // إشعار ترحيبي
                        new Notification('🌙 مرحباً بك', {
                            body: 'تم تفعيل الإشعارات بنجاح، ستصلک تذكيرات الصلوات',
                            icon: 'https://cdn-icons-png.flaticon.com/512/2319/2319833.png'
                        });
                        
                    } else {
                        elements.notifStatus.className = 'notif-error';
                        elements.notifStatus.innerText = '❌ لم يتم تفعيل الإشعارات - الرجاء السماح من الإعدادات';
                        elements.notifStatus.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error('خطأ:', error);
                }
            };

            // ==================== باقي الدوال ====================
            function refreshUI() {
                elements.counter.innerText = count;
                elements.total.innerText = total;
                elements.laps.innerText = Math.floor(total / 33);
                localStorage.setItem('tasbih_total', total);
            }

            elements.mainBtn.addEventListener('click', () => {
                count++;
                total++;
                if (isSoundOn) elements.clickSfx.play().catch(() => {});
                if ("vibrate" in navigator) navigator.vibrate(30);
                refreshUI();
            });

            window.changeDhikr = function() {
                dhikrIdx = (dhikrIdx + 1) % dhikrs.length;
                elements.dhikrDisplay.innerText = dhikrs[dhikrIdx];
                count = 0;
                refreshUI();
            };

            window.resetCounter = function() {
                if (confirm('هل أنت متأكد؟')) {
                    count = 0;
                    total = 0;
                    refreshUI();
                }
            };

            window.toggleSound = function() {
                isSoundOn = !isSoundOn;
                elements.soundToggle.innerText = isSoundOn ? '🔊 صوت: ON' : '🔇 صوت: OFF';
                localStorage.setItem('sound_enabled', isSoundOn);
            };

            // ==================== التهيئة ====================
            function init() {
                refreshUI();
                elements.dhikrDisplay.innerText = dhikrs[dhikrIdx];
                elements.soundToggle.innerText = isSoundOn ? '🔊 صوت: ON' : '🔇 صوت: OFF';
                updateDate();
                fetchPrayerTimes();
                
                // تحديث كل دقيقة
                setInterval(updateDate, 60000);
            }

            init();
        })();
    </script>
</body>
</html>
