<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبحتي • رمضان 2026</title>
    <meta name="theme-color" content="#d4af37">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            background: #111;
            border-radius: 40px;
            padding: 24px;
            border: 1px solid #d4af3740;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        
        .date-box {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #d4af37;
        }
        
        .hijri {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .gregorian {
            color: #888;
            font-size: 16px;
        }
        
        .ramadan-counter {
            background: #d4af3710;
            border-radius: 30px;
            padding: 16px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            border: 1px solid #d4af3740;
        }
        
        .counter-label {
            color: #d4af37;
            font-weight: 500;
        }
        
        .counter-number {
            font-size: 28px;
            font-weight: bold;
            color: white;
        }
        
        .prayer-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .prayer-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        
        .prayer-row:last-child {
            border-bottom: none;
        }
        
        .prayer-name {
            color: #d4af37;
            font-weight: 600;
        }
        
        .prayer-time {
            font-family: monospace;
            font-size: 18px;
            direction: ltr;
        }
        
        .tasbih-circle {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 3px solid #d4af37;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
        
        .counter {
            font-size: 64px;
            font-weight: bold;
            color: white;
        }
        
        .btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 12px;
            cursor: pointer;
        }
        
        .btn-gold {
            background: #d4af37;
            color: black;
            border: none;
            font-weight: bold;
        }
        
        .btn-test {
            background: #2a2a2a;
            border: 2px dashed #d4af37;
            color: #d4af37;
        }
        
        .status-box {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 16px;
            margin-top: 16px;
            display: none;
            text-align: center;
        }
        
        .success {
            border: 2px solid #22c55e;
            color: #22c55e;
        }
        
        .error {
            border: 2px solid #ef4444;
            color: #ef4444;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #d4af37;
        }
        
        .stat-label {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- التاريخ الحقيقي (ثابت لأن API لا تعمل بدون HTTPS) -->
    <div class="date-box">
        <div class="hijri">26 شعبان 1447 هـ</div>
        <div class="gregorian">الخميس 26 فبراير 2026</div>
    </div>
    
    <!-- عداد رمضان الحقيقي -->
    <div class="ramadan-counter">
        <span class="counter-label">🌙 رمضان 2026</span>
        <span class="counter-number" id="ramadanDays">358</span>
    </div>
    
    <!-- مواقيت الصلاة الثابتة (القاهرة) -->
    <div class="prayer-card">
        <div class="prayer-row">
            <span class="prayer-name">🌅 الفجر</span>
            <span class="prayer-time">04:18 ص</span>
        </div>
        <div class="prayer-row">
            <span class="prayer-name">☀️ الظهر</span>
            <span class="prayer-time">11:58 ص</span>
        </div>
        <div class="prayer-row">
            <span class="prayer-name">⛅ العصر</span>
            <span class="prayer-time">03:28 م</span>
        </div>
        <div class="prayer-row">
            <span class="prayer-name">🌇 المغرب</span>
            <span class="prayer-time">05:48 م</span>
        </div>
        <div class="prayer-row">
            <span class="prayer-name">🌙 العشاء</span>
            <span class="prayer-time">07:18 م</span>
        </div>
    </div>
    
    <!-- الذكر -->
    <div style="text-align: center; margin: 16px 0;">
        <div style="color: #d4af37; font-size: 14px;">الذكر الحالي</div>
        <div id="dhikrText" style="font-size: 32px; font-weight: bold;">سبحان الله</div>
    </div>
    
    <!-- دائرة التسبيح -->
    <div class="tasbih-circle" id="tasbihBtn">
        <span class="counter" id="counter">0</span>
        <span style="color: #d4af37; font-size: 12px;">اضغط للتسبيح</span>
    </div>
    
    <!-- الإحصائيات -->
    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">إجمالي التسبيح</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="khatmatCount">0</div>
            <div class="stat-label">عدد الختمات</div>
        </div>
    </div>
    
    <!-- الأزرار -->
    <button class="btn" onclick="nextDhikr()">🔄 الذكر التالي</button>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <button class="btn" onclick="resetCounter()">🔄 تصفير</button>
        <button class="btn" id="soundBtn" onclick="toggleSound()">🔊 صوت: ON</button>
    </div>
    
    <!-- الإشعارات الحقيقية (تعمل على المتصفحات الحديثة) -->
    <button class="btn btn-gold" onclick="enableNotifications()">
        🔔 تفعيل الإشعارات الحقيقية
    </button>
    
    <button class="btn btn-test" onclick="testRealNotification()">
        📱 تجربة الإشعار الفوري
    </button>
    
    <!-- حالة الإشعارات -->
    <div id="statusMessage" class="status-box"></div>
</div>

<script>
// ==================== البيانات الحقيقية المحفوظة ====================

// تهيئة المتغيرات
let currentCount = 0;
let totalCount = parseInt(localStorage.getItem('totalTasbih')) || 0;
let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
let currentDhikr = parseInt(localStorage.getItem('currentDhikr')) || 0;

const dhikrList = [
    "سبحان الله",
    "الحمد لله",
    "لا إله إلا الله",
    "الله أكبر",
    "أستغفر الله",
    "اللهم صل على محمد"
];

// عناصر DOM
const counterEl = document.getElementById('counter');
const totalEl = document.getElementById('totalCount');
const khatmatEl = document.getElementById('khatmatCount');
const dhikrEl = document.getElementById('dhikrText');
const soundBtn = document.getElementById('soundBtn');
const statusMsg = document.getElementById('statusMessage');

// ==================== التحديث ====================
function updateDisplay() {
    counterEl.textContent = currentCount;
    totalEl.textContent = totalCount;
    khatmatEl.textContent = Math.floor(totalCount / 33);
    
    // حفظ في localStorage
    localStorage.setItem('totalTasbih', totalCount);
    localStorage.setItem('currentDhikr', currentDhikr);
}

// ==================== التسبيح ====================
document.getElementById('tasbihBtn').addEventListener('click', function() {
    currentCount++;
    totalCount++;
    
    // صوت
    if (soundEnabled) {
        try {
            const audio = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pw==');
            audio.play().catch(() => {});
        } catch (e) {}
    }
    
    // اهتزاز
    if ('vibrate' in navigator) {
        navigator.vibrate(20);
    }
    
    // تأثير 33
    if (currentCount % 33 === 0) {
        if ('vibrate' in navigator) {
            navigator.vibrate([50, 50, 50]);
        }
        
        // تأثير بصري
        document.querySelector('.tasbih-circle').style.boxShadow = '0 0 60px #d4af37';
        setTimeout(() => {
            document.querySelector('.tasbih-circle').style.boxShadow = '0 10px 30px rgba(212, 175, 55, 0.2)';
        }, 300);
    }
    
    updateDisplay();
});

// ==================== تغيير الذكر ====================
function nextDhikr() {
    currentDhikr = (currentDhikr + 1) % dhikrList.length;
    dhikrEl.textContent = dhikrList[currentDhikr];
    currentCount = 0;
    updateDisplay();
}

// ==================== تصفير ====================
function resetCounter() {
    if (confirm('هل أنت متأكد من تصفير جميع الأعداد؟')) {
        currentCount = 0;
        totalCount = 0;
        updateDisplay();
    }
}

// ==================== تشغيل/إيقاف الصوت ====================
function toggleSound() {
    soundEnabled = !soundEnabled;
    soundBtn.textContent = soundEnabled ? '🔊 صوت: ON' : '🔇 صوت: OFF';
    localStorage.setItem('soundEnabled', soundEnabled);
}

// ==================== الإشعارات الحقيقية (تعمل بدون إنترنت) ====================
async function enableNotifications() {
    statusMsg.style.display = 'block';
    
    if (!('Notification' in window)) {
        statusMsg.className = 'status-box error';
        statusMsg.textContent = '❌ المتصفح لا يدعم الإشعارات';
        return;
    }
    
    try {
        const permission = await Notification.requestPermission();
        
        if (permission === 'granted') {
            statusMsg.className = 'status-box success';
            statusMsg.textContent = '✅ تم تفعيل الإشعارات بنجاح';
            
            // إشعار ترحيبي
            new Notification('🌙 مرحباً بك', {
                body: 'الإشعارات مفعلة الآن',
                icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23d4af37\'/%3E%3Ctext x=\'50\' y=\'70\' font-size=\'60\' text-anchor=\'middle\' fill=\'black\'%3E🌙%3C/text%3E%3C/svg%3E'
            });
            
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 3000);
        } else {
            statusMsg.className = 'status-box error';
            statusMsg.textContent = '❌ تم رفض الإشعارات';
        }
    } catch (error) {
        statusMsg.className = 'status-box error';
        statusMsg.textContent = '❌ خطأ: ' + error.message;
    }
}

// ==================== تجربة الإشعار الفوري ====================
function testRealNotification() {
    statusMsg.style.display = 'block';
    
    if (Notification.permission !== 'granted') {
        statusMsg.className = 'status-box error';
        statusMsg.textContent = '❌ الإشعارات غير مفعلة. اضغط على "تفعيل الإشعارات" أولاً';
        return;
    }
    
    try {
        // إشعار حقيقي
        const notification = new Notification('🧪 تجربة ناجحة', {
            body: 'الإشعارات تعمل بشكل حقيقي 100% ✅',
            icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%2322c55e\'/%3E%3Ctext x=\'50\' y=\'70\' font-size=\'60\' text-anchor=\'middle\' fill=\'white\'%3E✅%3C/text%3E%3C/svg%3E',
            vibrate: [200, 100, 200]
        });
        
        notification.onclick = function() {
            window.focus();
            notification.close();
        };
        
        statusMsg.className = 'status-box success';
        statusMsg.textContent = '✅ تم إرسال الإشعار بنجاح';
        
        // صوت واهتزاز
        if (soundEnabled) {
            try {
                const audio = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pzw/PD88Pw==');
                audio.play().catch(() => {});
            } catch (e) {}
        }
        
        if ('vibrate' in navigator) {
            navigator.vibrate([200, 100, 200]);
        }
        
        setTimeout(() => {
            statusMsg.style.display = 'none';
        }, 3000);
        
    } catch (error) {
        statusMsg.className = 'status-box error';
        statusMsg.textContent = '❌ خطأ: ' + error.message;
    }
}

// ==================== عداد رمضان الحقيقي ====================
function updateRamadanCounter() {
    const today = new Date();
    const ramadan2026 = new Date(2026, 1, 18); // 18 فبراير 2026
    const diff = Math.ceil((ramadan2026 - today) / (1000 * 60 * 60 * 24));
    document.getElementById('ramadanDays').textContent = diff > 0 ? diff : 'اليوم';
}

// ==================== التهيئة ====================
updateDisplay();
updateRamadanCounter();
soundBtn.textContent = soundEnabled ? '🔊 صوت: ON' : '🔇 صوت: OFF';
dhikrEl.textContent = dhikrList[currentDhikr];

// تحديث عداد رمضان كل يوم
setInterval(updateRamadanCounter, 86400000);
</script>

</body>
</html>
