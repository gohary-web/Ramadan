<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبحه إلكترونية 🌙</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
    <script>
      window.OneSignal = window.OneSignal || [];
      OneSignal.push(function() {
        OneSignal.init({
          appId: "7724086e-22de-45ef-bc4c-f4b5cd122604",
          allowLocalhostAsSecureOrigin: true,
        });
      });
    </script>

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }
        .main-container { width: 100%; max-width: 380px; text-align: center; padding: 1.5rem; }
        .ring-container { position: relative; width: 250px; height: 250px; margin: 1.2rem auto; display: flex; align-items: center; justify-content: center; }
        .tasbih-circle { width: 100%; height: 100%; border: 2px solid #333; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: radial-gradient(circle, #111 0%, #050505 100%); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tasbih-circle:active { transform: scale(0.96); border-color: #d4af37; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); border-color: #d4af37 !important; }
        .control-btn { background: #1a1a1a; border: 1px solid #333; padding: 0.7rem; border-radius: 12px; font-size: 0.85rem; transition: 0.3s; width: 100%; }
        .info-card { background: linear-gradient(145deg, #161616, #0d0d0d); border: 1px solid #d4af3722; border-radius: 15px; padding: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="info-card">
                <p class="text-[9px] text-[#d4af37] uppercase tracking-widest mb-1">رمضان متبقي</p>
                <div class="text-lg font-bold"><span id="days-left">--</span> <span class="text-xs font-light text-gray-400">يوم</span></div>
            </div>
            <div class="info-card">
                <p class="text-[9px] text-[#d4af37] uppercase tracking-widest mb-1">أذان المغرب (القاهرة)</p>
                <div id="maghrib-time" class="text-lg font-bold text-white">--:--</div>
            </div>
        </div>

        <div class="mb-4">
            <h1 class="text-[#d4af37] text-xs tracking-[0.2em] mb-1 uppercase font-light italic">رمضان مبارك</h1>
            <p id="dhikr-display" class="text-xl font-medium text-gray-200">سبحان الله</p>
        </div>

        <div class="ring-container">
            <div id="main-tap" class="tasbih-circle">
                <span id="counter" class="text-7xl font-light tracking-tighter text-white">0</span>
                <span class="text-[10px] text-[#d4af37] mt-2 tracking-widest uppercase">اضغط للتسبيح</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-[#111] p-3 rounded-2xl border border-white/5">
                <span class="block text-[10px] text-gray-500 mb-1">الإجمالي</span>
                <span id="total-count" class="text-lg font-bold text-gray-300">0</span>
            </div>
            <div class="bg-[#111] p-3 rounded-2xl border border-white/5">
                <span class="block text-[10px] text-gray-500 mb-1">الدورات (33)</span>
                <span id="laps-count" class="text-lg font-bold text-gray-300">0</span>
            </div>
        </div>

        <div class="flex flex-col gap-2">
            <button onclick="changeDhikr()" class="control-btn text-gray-300 border-dashed border-gray-700">الذكر التالي</button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="resetCounter()" class="control-btn text-red-400/80">تصفير</button>
                <button onclick="toggleSound()" id="sound-toggle" class="control-btn text-gray-300">صوت: ON</button>
            </div>
            <button id="notif-btn" class="mt-2 text-[11px] text-[#d4af37] bg-[#d4af3711] p-2 rounded-lg border border-[#d4af3733]" onclick="requestPermission()">🔔 تفعيل تنبيهات الإفطار (10 دقائق قبل الأذان)</button>
        </div>
    </div>

    <audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        let count = 0;
        let total = parseInt(localStorage.getItem('tasbih_total')) || 0;
        let isSoundOn = true;
        const dhikrs = ["سبحان الله", "الحمد لله", "لا إله إلا الله", "الله أكبر", "أستغفر الله", "اللهم صلِّ على محمد"];
        let dhikrIdx = 0;

        const mainBtn = document.getElementById('main-tap');
        const counterDisplay = document.getElementById('counter');
        const totalDisplay = document.getElementById('total-count');
        const lapsDisplay = document.getElementById('laps-count');
        const dhikrDisplay = document.getElementById('dhikr-display');
        const sfx = document.getElementById('click-sfx');

        // تحديث الواجهة عند التحميل
        totalDisplay.innerText = total;
        lapsDisplay.innerText = Math.floor(total / 33);

        async function fetchMaghribAndSchedule() {
            try {
                const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
                const data = await response.json();
                const maghrib = data.data.timings.Maghrib;
                
                const [hours, minutes] = maghrib.split(':');
                const h = hours % 12 || 12;
                const ampm = hours >= 12 ? 'م' : 'ص';
                document.getElementById('maghrib-time').innerText = `${h}:${minutes} ${ampm}`;

                scheduleLocalAlert(hours, minutes);
            } catch (e) { console.log("خطأ في جلب الوقت"); }
        }

        function scheduleLocalAlert(h, m) {
            const now = new Date();
            const prayer = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
            const notifyTime = new Date(prayer.getTime() - 10 * 60000);
            
            if (notifyTime > now) {
                const diff = notifyTime - now;
                setTimeout(() => {
                    if (Notification.permission === "granted") {
                        new Notification("اقترب موعد الإفطار 🌙", {
                            body: "باقي 10 دقائق على الأذان.. تقبل الله طاعتكم.",
                            icon: "https://cdn-icons-png.flaticon.com/512/2319/2319833.png"
                        });
                    }
                }, diff);
            }
        }

        mainBtn.addEventListener('click', () => {
            count++; total++;
            counterDisplay.innerText = count;
            totalDisplay.innerText = total;
            lapsDisplay.innerText = Math.floor(total / 33);
            localStorage.setItem('tasbih_total', total);
            if ("vibrate" in navigator) navigator.vibrate(40);
            if (isSoundOn) { sfx.currentTime = 0; sfx.play(); }
            if (count % 33 === 0) {
                mainBtn.classList.add('gold-glow');
                setTimeout(() => mainBtn.classList.remove('gold-glow'), 300);
            }
        });

        function changeDhikr() {
            dhikrIdx = (dhikrIdx + 1) % dhikrs.length;
            dhikrDisplay.innerText = dhikrs[dhikrIdx];
            count = 0;
            counterDisplay.innerText = 0;
        }

        function resetCounter() {
            if(confirm("هل تريد تصفير العداد؟")) {
                count = 0; total = 0;
                localStorage.setItem('tasbih_total', 0);
                counterDisplay.innerText = 0; totalDisplay.innerText = 0; lapsDisplay.innerText = 0;
            }
        }

        function toggleSound() {
            isSoundOn = !isSoundOn;
            document.getElementById('sound-toggle').innerText = isSoundOn ? "صوت: ON" : "صوت: OFF";
        }

        function requestPermission() {
            OneSignal.push(function() {
                OneSignal.showNativePrompt();
            });
        }

        function updateRamadanCountdown() {
            const now = new Date();
            let ramadanDate = new Date(2026, 1, 18); 
            const diffDays = Math.ceil((ramadanDate - now) / (1000 * 60 * 60 * 24));
            document.getElementById('days-left').innerText = diffDays > 0 ? diffDays : "رمضان كريم";
        }

        updateRamadanCountdown();
        fetchMaghribAndSchedule();
    </script>
</body>
</html>
